id: v2-search-filters-middle-layer
version: v2
feature_id: v2-search-filters
module: search
status: draft
docs_refs:
  - file: docs/ux/page-specs/stage-2-experience/S2-02-search-filters.md
    line_start: 23
    line_end: 32
    heading: 页面功能
    excerpt: 将过滤条件显示为 chips。
  - file: docs/core/capability-specs/stage-2-experience/C2-02-search-filters.md
    line_start: 8
    line_end: 19
    heading: Core API
    excerpt: list_filter_facets(repo_path, query) -> SearchFacets
insertions:
  - target: v2-search-query result workflow
    reason: Filters refine the already planned search query surface and must follow the base query contract.
    before: Search query provides result retrieval without typed filter facets.
    after: Typed filter chips and filter facets can be planned without changing live v1 queue behavior.
links:
  - feature: v2-search-query
    relationship: depends-on
    reason: Filter facets and filtered results depend on base search query semantics.
code_impacts:
  existing:
    - docs/ux/page-specs/stage-2-experience/S2-02-search-filters.md
    - docs/core/capability-specs/stage-2-experience/C2-02-search-filters.md
    - docs/api/core-api.md
    - docs/architecture/mvp-control-map.md
    - core/area_matrix.udl
    - apps/macos/AreaMatrix/**
  expected:
    - apps/macos/AreaMatrix/Features/Search/**
    - core/src/search/**
  tests:
    - apps/macos/AreaMatrixTests/**
    - core/tests/**
dependencies:
  features:
    - v2-search-query
  docs:
    - docs/ux/page-specs/stage-2-experience/S2-02-search-filters.md
    - docs/core/capability-specs/stage-2-experience/C2-02-search-filters.md
  code: []
  tasks:
    - v2-search-query/core-query
slice_plan:
  - id: filter-contract
    purpose: Define filter semantics, empty states, and error boundaries.
    inputs:
      - docs/ux/page-specs/stage-2-experience/S2-02-search-filters.md
      - docs/core/capability-specs/stage-2-experience/C2-02-search-filters.md
    outputs:
      - workflow filter contract plan
    acceptance:
      - ./dev workflow plan --version v2
      - ./dev check prompts
  - id: filter-core-bridge
    purpose: Wire filter DTOs through Core API, UDL, and Swift bridge.
    inputs:
      - docs/core/capability-specs/stage-2-experience/C2-02-search-filters.md
      - core/area_matrix.udl
    outputs:
      - Core and Swift bridge filter DTO flow
    acceptance:
      - ./dev build core --profile debug
      - ./dev test macos
risk_boundaries:
  - Filter changes must be read-only until the user applies an explicit action.
  - Query errors must not mutate saved searches or file metadata.
  - Does not connect to the live v1 task-loop queue.
