name: Core CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  prompt-doctor:
    name: prompt doctor
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: python3 tasks/prompts/_shared/prompt_pipeline.py doctor

  fmt:
    name: cargo fmt
    runs-on: macos-14
    needs: prompt-doctor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
        working-directory: core

  clippy:
    name: cargo clippy
    runs-on: macos-14
    needs: prompt-doctor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: core

  test:
    name: cargo test
    runs-on: macos-14
    needs: prompt-doctor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - run: cargo test --all-features --workspace
        working-directory: core

  build-universal:
    name: build universal binary and bindings
    runs-on: macos-14
    needs: prompt-doctor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Install UniFFI bindgen
        run: cargo install uniffi-bindgen --locked --version 0.28.3
      - name: Build core
        run: ./dev build core

  coverage:
    name: coverage gate
    runs-on: macos-14
    needs: prompt-doctor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Run coverage
        working-directory: core
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info --fail-under-lines 70
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: core/lcov.info
