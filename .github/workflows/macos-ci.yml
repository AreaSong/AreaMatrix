name: macOS App CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prompt-doctor:
    name: prompt doctor
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: python3 tasks/prompts/_shared/prompt_pipeline.py doctor

  build:
    name: Xcode build & test
    runs-on: macos-14
    needs: prompt-doctor
    steps:
      - uses: actions/checkout@v4

      - name: Check macOS project
        id: macos_project
        run: |
          if [[ -d apps/macos/AreaMatrix.xcodeproj ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "macOS app project is not present yet; skipping app build steps."
          fi

      - name: Show Xcode version
        if: steps.macos_project.outputs.present == 'true'
        run: xcodebuild -version

      - uses: dtolnay/rust-toolchain@stable
        if: steps.macos_project.outputs.present == 'true'
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        if: steps.macos_project.outputs.present == 'true'
        with:
          workspaces: core

      - name: Install UniFFI bindgen
        if: steps.macos_project.outputs.present == 'true'
        run: cargo install uniffi-bindgen --locked --version 0.28.3

      - name: Install xcbeautify
        if: steps.macos_project.outputs.present == 'true'
        run: brew install xcbeautify

      - name: Build core (Rust → universal staticlib + Swift bindings)
        if: steps.macos_project.outputs.present == 'true'
        run: ./scripts/build-core.sh

      - name: Resolve Swift package dependencies
        if: steps.macos_project.outputs.present == 'true'
        run: |
          xcodebuild -resolvePackageDependencies \
            -project apps/macos/AreaMatrix.xcodeproj \
            -scheme AreaMatrix

      - name: Build & test
        if: steps.macos_project.outputs.present == 'true'
        run: |
          xcodebuild test \
            -project apps/macos/AreaMatrix.xcodeproj \
            -scheme AreaMatrix \
            -destination 'platform=macOS,arch=arm64' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --quiet

      - uses: actions/upload-artifact@v4
        if: always() && steps.macos_project.outputs.present == 'true'
        with:
          name: xcresult
          path: TestResults.xcresult

  swiftlint:
    name: SwiftLint
    runs-on: macos-14
    needs: prompt-doctor
    steps:
      - uses: actions/checkout@v4
      - name: Check macOS sources
        id: macos_sources
        run: |
          if [[ -d apps/macos ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "macOS app sources are not present yet; skipping SwiftLint."
          fi
      - name: Install SwiftLint
        if: steps.macos_sources.outputs.present == 'true'
        run: brew install swiftlint
      - name: Run SwiftLint
        if: steps.macos_sources.outputs.present == 'true'
        run: swiftlint --strict
        working-directory: apps/macos

  swiftformat:
    name: SwiftFormat lint
    runs-on: macos-14
    needs: prompt-doctor
    steps:
      - uses: actions/checkout@v4
      - name: Check macOS sources
        id: macos_sources
        run: |
          if [[ -d apps/macos ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "macOS app sources are not present yet; skipping SwiftFormat."
          fi
      - name: Install SwiftFormat
        if: steps.macos_sources.outputs.present == 'true'
        run: brew install swiftformat
      - name: Run SwiftFormat (check)
        if: steps.macos_sources.outputs.present == 'true'
        run: swiftformat --lint .
        working-directory: apps/macos
