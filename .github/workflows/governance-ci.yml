name: Governance CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  governance:
    name: governance, prompts, skills, and task-loop
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Governance check
        run: ./dev check governance

      - name: Skill health
        run: ./dev check skills

      - name: Task-loop health
        run: ./dev check task-loop

      - name: Prompt doctor
        run: ./dev check prompts

      - name: Diff whitespace check
        run: ./dev check diff

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
