<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">AreaMatrix App Icon</title>
  <desc id="desc">A rounded app icon showing a local folder with a matrix grid and a traceable A-shaped path.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="904" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FCF8"/>
      <stop offset="0.52" stop-color="#E8F3EE"/>
      <stop offset="1" stop-color="#D4E8E1"/>
    </linearGradient>
    <linearGradient id="folder" x1="212" y1="280" x2="812" y2="798" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#173A33"/>
      <stop offset="1" stop-color="#0B201D"/>
    </linearGradient>
    <linearGradient id="path" x1="320" y1="678" x2="594" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1AAE98"/>
      <stop offset="0.6" stop-color="#38C7B2"/>
      <stop offset="1" stop-color="#F0B64A"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#0B201D" flood-opacity="0.18"/>
    </filter>
    <filter id="innerLift" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0B201D" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="210" fill="url(#bg)"/>
  <g filter="url(#softShadow)">
    <path
      d="M212 332C212 305.5 233.5 284 260 284H385.5C402.7 284 419 291.7 430 304.8L470.5 353H764C790.5 353 812 374.5 812 401V724C812 763.8 779.8 796 740 796H284C244.2 796 212 763.8 212 724V332Z"
      fill="url(#folder)"/>
    <path
      d="M256 421C256 391.2 280.2 367 310 367H746C775.8 367 800 391.2 800 421V724C800 757.1 773.1 784 740 784H284C250.9 784 224 757.1 224 724V453C224 435.3 238.3 421 256 421Z"
      fill="#1E4B43" opacity="0.52"/>
    <rect x="270" y="404" width="484" height="330" rx="54" fill="#F9FCF9" filter="url(#innerLift)"/>

    <g opacity="0.92">
      <path d="M354 638L432 506L504 638L582 506L666 638" fill="none" stroke="#B9CBC5" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M354 638H666" fill="none" stroke="#D6E3DF" stroke-width="10" stroke-linecap="round"/>
      <path d="M432 506H582" fill="none" stroke="#D6E3DF" stroke-width="10" stroke-linecap="round"/>
    </g>

    <g fill="#D7E8E2">
      <rect x="326" y="458" width="48" height="48" rx="14"/>
      <rect x="428" y="458" width="48" height="48" rx="14"/>
      <rect x="530" y="458" width="48" height="48" rx="14"/>
      <rect x="632" y="458" width="48" height="48" rx="14"/>
      <rect x="326" y="562" width="48" height="48" rx="14"/>
      <rect x="632" y="562" width="48" height="48" rx="14"/>
      <rect x="326" y="666" width="48" height="48" rx="14"/>
      <rect x="428" y="666" width="48" height="48" rx="14"/>
      <rect x="530" y="666" width="48" height="48" rx="14"/>
      <rect x="632" y="666" width="48" height="48" rx="14"/>
    </g>

    <path
      d="M338 678L456 476C466.2 458.5 491.8 458.5 502 476L620 678M402 594H556"
      fill="none"
      stroke="url(#path)"
      stroke-width="54"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <circle cx="456" cy="476" r="31" fill="#F0B64A"/>
    <circle cx="338" cy="678" r="25" fill="#1AAE98"/>
    <circle cx="620" cy="678" r="25" fill="#38C7B2"/>
    <circle cx="556" cy="594" r="19" fill="#173A33"/>
  </g>
</svg>
