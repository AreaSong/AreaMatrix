            <path d="M42 116H338"/>
            <path d="M20 190H360"/>
            <path d="M42 264H338"/>
            <path d="M116 70V310"/>
            <path d="M190 42V354"/>
            <path d="M264 70V310"/>
          </g>
          <path d="M68 284L154 174L216 238L306 104" fill="none" stroke="url(#tealLine)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M154 174L190 294L216 238" fill="none" stroke="#F7FBF8" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
          <g fill="#F7FBF8">
