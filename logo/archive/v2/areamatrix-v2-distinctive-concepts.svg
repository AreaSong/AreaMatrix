            <circle cx="264" cy="116" r="9"/>
            <circle cx="116" cy="264" r="9"/>
            <circle cx="264" cy="264" r="9"/>
          </g>
          <circle cx="154" cy="174" r="22" fill="#F1B84E"/>
          <circle cx="68" cy="284" r="18" fill="#16B7A2"/>
          <circle cx="306" cy="104" r="18" fill="#E96D5A"/>
        </g>
      </g>
    </g>
    <text x="48" y="448" font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif" font-size="28" font-weight="760" fill="#173A33">01 Matrix Compass</text>
    <text x="48" y="482" font-family="Inter, SF Pro Text, Segoe UI, Arial, sans-serif" font-size="17" font-weight="520" fill="#58706A">像资料库里的导航罗盘，搜索、路径、回顾感最强。</text>
  </g>

