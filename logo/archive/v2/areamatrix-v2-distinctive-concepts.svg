        <rect x="104" y="200" width="18" height="18" rx="5"/>
        <rect x="104" y="246" width="18" height="18" rx="5"/>
      </g>
    </g>
    <text x="48" y="448" font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif" font-size="28" font-weight="760" fill="#173A33">02 Local Core</text>
    <text x="48" y="482" font-family="Inter, SF Pro Text, Segoe UI, Arial, sans-serif" font-size="17" font-weight="520" fill="#58706A">本地仓库核心符号，文件、索引、AI 路径更集中。</text>
  </g>

