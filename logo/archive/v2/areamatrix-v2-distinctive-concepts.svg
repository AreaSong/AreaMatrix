      </g>
      <path d="M72 286C117 216 166 176 220 166C262 158 291 178 322 222" fill="none" stroke="#C6DAD4" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M72 286C137 283 178 244 196 168C205 128 233 104 282 94" fill="none" stroke="url(#tealLine)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M154 252H260" stroke="#16B7A2" stroke-width="26" stroke-linecap="round"/>
      <circle cx="72" cy="286" r="20" fill="#16B7A2"/>
      <circle cx="196" cy="168" r="22" fill="#F1B84E"/>
      <circle cx="282" cy="94" r="19" fill="#E96D5A"/>
      <circle cx="260" cy="252" r="15" fill="#173A33"/>
    </g>
    <text x="48" y="448" font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif" font-size="28" font-weight="760" fill="#173A33">03 Trace Atlas</text>
    <text x="48" y="482" font-family="Inter, SF Pro Text, Segoe UI, Arial, sans-serif" font-size="17" font-weight="520" fill="#58706A">文件流、时间轴、弱链接合成一条资料星图路径。</text>
