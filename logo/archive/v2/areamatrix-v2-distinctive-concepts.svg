<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 760" role="img" aria-labelledby="title desc">
  <title id="title">AreaMatrix V2 Distinctive Logo Concepts</title>
  <desc id="desc">Three more distinctive AreaMatrix logo directions: Matrix Compass, Local Core, and Trace Atlas.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1800" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFCF8"/>
      <stop offset="1" stop-color="#EDF6F1"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="380" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#173A33"/>
      <stop offset="1" stop-color="#0A201E"/>
    </linearGradient>
    <linearGradient id="tealLine" x1="0" y1="0" x2="380" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16B7A2"/>
      <stop offset="0.62" stop-color="#42D1BB"/>
      <stop offset="1" stop-color="#F1B84E"/>
    </linearGradient>
    <linearGradient id="coralLine" x1="0" y1="0" x2="380" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15B49F"/>
      <stop offset="0.55" stop-color="#F1B84E"/>
      <stop offset="1" stop-color="#E96D5A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0A201E" flood-opacity="0.16"/>
    </filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0A201E" flood-opacity="0.12"/>
    </filter>
    <clipPath id="diamondClip">
      <path d="M190 42L338 116L360 280L190 354L20 280L42 116Z"/>
    </clipPath>
  </defs>

  <rect width="1800" height="760" fill="url(#paper)"/>
  <text x="90" y="86" font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif" font-size="36" font-weight="760" fill="#173A33">AreaMatrix logo directions</text>
  <text x="90" y="124" font-family="Inter, SF Pro Text, Segoe UI, Arial, sans-serif" font-size="19" font-weight="520" fill="#58706A">去掉通用文件夹感，突出本地矩阵、自动归档路径、资料关联。</text>

